<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>University — Tolbert Innovation Hub | Study Abroad Portal</title>
<meta name="description" content="Explore detailed profiles of Tolbert Innovation Hub's partner universities — programs, tuition fees, scholarships, accommodation, student life and admission requirements." />
<meta name="keywords" content="study abroad Liberia, international universities, scholarships, India universities, North Cyprus, Tolbert Innovation Hub, student counseling" />
<meta property="og:title" content="Partner University — Tolbert Innovation Hub" />
<meta property="og:description" content="Programs, tuition, scholarships, accommodation and student life at our partner universities. Apply online with expert guidance." />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#5b46f5" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/styles.css" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%235b46f5'/><text x='50' y='70' font-size='62' fill='white' text-anchor='middle' font-family='sans-serif' font-weight='bold'>T</text></svg>" />
<style>
  /* page-specific helpers for the university detail page */
  .uni-hero { color:#fff; border-radius:28px; overflow:hidden; padding:clamp(2rem,5vw,3.4rem); position:relative; }
  .uni-hero::after { content:''; position:absolute; inset:0; background:linear-gradient(120deg, rgba(0,0,0,.05), rgba(0,0,0,.30)); pointer-events:none; }
  .uni-hero > * { position:relative; z-index:1; }
  .uni-hero .badge-lg { width:96px; height:96px; border-radius:24px; display:grid; place-items:center; font-family:var(--f-display); font-weight:800; font-size:2.2rem; color:#fff; background:rgba(255,255,255,.16); border:2px solid rgba(255,255,255,.35); backdrop-filter:blur(6px); margin-bottom:1.2rem; }
  .uni-hero h1 { color:#fff; font-size:clamp(2rem,5vw,3.2rem); }
  .uni-hero .hero-meta { display:flex; flex-wrap:wrap; gap:1.2rem; margin-top:.9rem; color:rgba(255,255,255,.92); font-size:.95rem; }
  .uni-hero .hero-pill { display:inline-flex; align-items:center; gap:.4rem; background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.3); padding:.4rem .9rem; border-radius:100px; font-size:.84rem; font-weight:600; backdrop-filter:blur(6px); }
  .uni-hero .hero-cta { margin-top:1.8rem; }
  .video-frame { position:relative; width:100%; aspect-ratio:16/9; border-radius:var(--radius); overflow:hidden; border:1px solid var(--line); box-shadow:var(--shadow); }
  .video-frame iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .sec-head { margin-bottom:1.6rem; }
  .sec-head h2 { font-size:clamp(1.5rem,3.2vw,2.2rem); }
  .stat-mini { font-family:var(--f-display); font-weight:800; font-size:2.4rem; background:var(--brand-grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .req-list { display:flex; flex-direction:column; gap:.6rem; }
  .req-list .req { display:flex; align-items:center; gap:.65rem; font-size:.94rem; color:var(--ink2); }
  .req-list .req .tick { color:#10b981; font-weight:700; }
  .highlight-line { border-left:3px solid var(--brand); padding:.6rem 0 .6rem 1.1rem; font-family:var(--f-display); font-weight:600; font-size:1.05rem; color:var(--ink); margin-top:1.2rem; }
  #notFound { text-align:center; padding:5rem 1.5rem; }
  #notFound .em { font-size:3rem; }
</style>
</head>
<body>
<div class="bg-aurora"><span></span><span></span><span></span></div>
<canvas id="particles"></canvas>

<main>
  <div id="uniRoot"></div>
</main>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
  bootChrome("Universities");

  const id = getParam("id");
  const u = uniById(id);
  const root = document.getElementById("uniRoot");

  if (!u) {
    document.title = "University not found — Tolbert Innovation Hub";
    root.innerHTML = `
      <section class="section" style="padding-top:calc(var(--nav-h) + 3rem)">
        <div class="wrap">
          <div class="card glass" id="notFound" data-reveal>
            <div class="em">🧭</div>
            <h2 class="title" style="font-size:2rem">University not found</h2>
            <p class="lead" style="margin-bottom:1.6rem">We couldn't find that university. It may have moved, or the link is incomplete.</p>
            <a class="btn btn-primary" href="universities.html">← Back to all universities</a>
          </div>
        </div>
      </section>`;
    requestAnimationFrame(() => { initReveal(); initCounters(); });
  } else {
    document.title = `${u.name} — Tolbert Innovation Hub`;
    buildUniversity(u);
  }

  /* ── Gallery tiles config ──────────────────────────────── */
  const GALLERY = [
    { label: "Campus",        hue: 0 },
    { label: "Classrooms",    hue: 50 },
    { label: "Library",       hue: 100 },
    { label: "Accommodation", hue: 150 },
    { label: "Laboratories",  hue: 200 },
    { label: "Cafeteria",     hue: 250 },
    { label: "Sports",        hue: 300 }
  ];

  function pillList(items, emoji) {
    return `<div class="pill-list">${(items || []).map(p =>
      `<span class="pill">${emoji ? emoji + " " : ""}${escapeHtml(p)}</span>`).join("")}</div>`;
  }

  function eligibilityCheckerHTML(uniName) {
    return `
      <div class="card glass" style="padding:2.2rem">
        <span class="eyebrow">Instant Check</span>
        <h2 style="font-size:clamp(1.4rem,3vw,2rem)">Am I eligible for ${escapeHtml(uniName)}?</h2>
        <p class="lead" style="margin-bottom:1.4rem">Enter your grades to see whether you qualify — no sign-up needed.</p>
        <div class="field-row">
          <div class="field">
            <label for="egGpa">GPA (out of 4.0)</label>
            <input type="number" id="egGpa" min="0" max="4" step="0.1" placeholder="e.g. 3.2" />
          </div>
          <div class="field">
            <label for="egWaec">WAEC subjects passed</label>
            <input type="number" id="egWaec" min="0" max="12" step="1" placeholder="e.g. 6" />
          </div>
        </div>
        <div class="field">
          <label for="egLevel">Degree Level</label>
          <select id="egLevel">
            <option value="Undergraduate">Undergraduate</option>
            <option value="Postgraduate">Postgraduate</option>
          </select>
        </div>
        <button class="btn btn-primary" id="egCheck" type="button">Check Eligibility →</button>
        <div id="egResult"></div>
      </div>`;
  }

  /* ── Build the full page ───────────────────────────────── */
  function buildUniversity(u) {
    const heroBg = `linear-gradient(135deg, ${u.accent}, ${shade(u.accent, -30)})`;
    const saved = TIHStore.saved().includes(u.id);

    root.innerHTML = `
    <!-- 1. HERO -->
    <section class="section" style="padding-top:calc(var(--nav-h) + 2rem); padding-bottom:0">
      <div class="wrap">
        <a href="universities.html" class="muted" style="display:inline-block;margin-bottom:1.2rem;font-size:.9rem">← All universities</a>
        <div class="uni-hero" data-reveal style="background:${heroBg}">
          <div class="badge-lg">${escapeHtml(u.short)}</div>
          <span class="hero-pill">${flagFor(u.country)} ${escapeHtml(u.country)}</span>
          <h1>${escapeHtml(u.name)}</h1>
          <div class="hero-meta">
            <span>📍 ${escapeHtml(u.city)}, ${escapeHtml(u.country)}</span>
            <span>🏛️ Established ${u.founded}</span>
            <span>⭐ ${u.rating} / 5</span>
            <span>👥 ${escapeHtml(u.students)} students</span>
          </div>
          <div style="margin-top:1rem"><span class="hero-pill">🏅 ${escapeHtml(u.ranking)}</span></div>
          <div class="hero-cta" style="display:flex;flex-wrap:wrap;gap:.8rem">
            <a class="btn btn-light" href="apply.html?uni=${encodeURIComponent(u.id)}">Apply Now →</a>
            <a class="btn btn-light" href="${escapeHtml(u.website)}" target="_blank" rel="noopener">Visit Website ↗</a>
            <button class="btn btn-light" id="saveBtn" type="button">${saved ? "★ Saved" : "☆ Save"}</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 2. HERO VIDEO -->
    <section class="section" style="padding-bottom:0">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Watch</span>
          <h2 class="title">Campus Tour & Student Life</h2>
        </div>
        <div class="video-frame" data-reveal>
          <iframe src="${escapeHtml(u.video)}" title="${escapeHtml(u.name)} campus tour" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe>
        </div>
      </div>
    </section>

    <!-- 3. GALLERY -->
    <section class="section" style="padding-bottom:0">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Gallery</span>
          <h2 class="title">Inside the campus</h2>
        </div>
        <div class="gallery">
          ${GALLERY.map((g, i) => `
            <div class="g-item" data-reveal data-delay="${i % 4}" style="background:linear-gradient(135deg, hsl(${(g.hue + 210) % 360} 70% 55%), hsl(${(g.hue + 250) % 360} 70% 42%))">
              <span>${g.label}</span>
            </div>`).join("")}
        </div>
      </div>
    </section>

    <!-- 4. ABOUT -->
    <section class="section">
      <div class="wrap">
        <div class="card glass" data-reveal style="padding:2.4rem">
          <span class="eyebrow">About</span>
          <h2 class="title" style="font-size:clamp(1.5rem,3.2vw,2.2rem)">About ${escapeHtml(u.name)}</h2>
          <p class="lead">${escapeHtml(u.about)}</p>
          <div class="highlight-line">“${escapeHtml(u.tagline)}”</div>
        </div>
      </div>
    </section>

    <!-- 5. PROGRAMS -->
    <section class="section" style="background:var(--bg2)">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Academics</span>
          <h2 class="title">Programs Offered</h2>
        </div>
        <div class="grid-2col">
          <div class="card glass" data-reveal style="padding:2rem">
            <h3 style="margin-bottom:1rem">🎓 Undergraduate</h3>
            ${pillList(u.programsUG)}
          </div>
          <div class="card glass" data-reveal data-delay="1" style="padding:2rem">
            <h3 style="margin-bottom:1rem">📚 Postgraduate</h3>
            ${pillList(u.programsPG)}
          </div>
        </div>
      </div>
    </section>

    <!-- 6. TUITION FEES -->
    <section class="section">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Investment</span>
          <h2 class="title">Tuition Fees</h2>
        </div>
        <div class="table-wrap" data-reveal>
          <table>
            <thead><tr><th>Program</th><th>Duration</th><th>Tuition</th></tr></thead>
            <tbody>
              ${(u.fees || []).map(f => `
                <tr><td>${escapeHtml(f.program)}</td><td>${escapeHtml(f.duration)}</td><td><strong>${escapeHtml(f.tuition)}</strong></td></tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- 7. SCHOLARSHIPS -->
    <section class="section" style="background:var(--bg2)">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Funding</span>
          <h2 class="title">Scholarships</h2>
        </div>
        <div class="card glass" data-reveal style="padding:2rem">
          ${pillList(u.scholarships, "🎓")}
        </div>
      </div>
    </section>

    <!-- 8. ADMISSION REQUIREMENTS -->
    <section class="section">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Eligibility</span>
          <h2 class="title">Admission Requirements</h2>
        </div>
        <div class="grid-2col">
          <div class="card glass" data-reveal style="padding:2rem">
            <h3 style="margin-bottom:1.1rem">🎓 Undergraduate</h3>
            <div class="req-list">
              ${["High School Certificate", "WAEC Results", "Valid Passport", "Passport Photos"]
                .map(r => `<div class="req"><span class="tick">✔</span>${r}</div>`).join("")}
            </div>
          </div>
          <div class="card glass" data-reveal data-delay="1" style="padding:2rem">
            <h3 style="margin-bottom:1.1rem">📚 Postgraduate</h3>
            <div class="req-list">
              ${["Bachelor's Degree", "Academic Transcript", "Valid Passport", "Statement of Purpose"]
                .map(r => `<div class="req"><span class="tick">✔</span>${r}</div>`).join("")}
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 9. ELIGIBILITY CHECKER -->
    <section class="section" style="background:var(--bg2)">
      <div class="wrap" style="max-width:860px">
        ${eligibilityCheckerHTML(u.name)}
      </div>
    </section>

    <!-- 10. ACCOMMODATION -->
    <section class="section">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Living</span>
          <h2 class="title">Accommodation</h2>
        </div>
        <div class="card glass" data-reveal style="padding:2rem">
          <h4 class="muted" style="text-transform:uppercase;letter-spacing:.1em;font-size:.78rem;margin-bottom:.7rem">Room Types</h4>
          ${pillList(u.accommodation && u.accommodation.types, "🏠")}
          <p class="lead" style="font-size:1.02rem;margin:1.4rem 0">Estimated cost: <strong>${escapeHtml((u.accommodation && u.accommodation.cost) || "—")}</strong></p>
          <h4 class="muted" style="text-transform:uppercase;letter-spacing:.1em;font-size:.78rem;margin-bottom:.7rem">Facilities</h4>
          ${pillList(u.accommodation && u.accommodation.facilities, "✅")}
        </div>
      </div>
    </section>

    <!-- 11. STUDENT LIFE -->
    <section class="section" style="background:var(--bg2)">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Experience</span>
          <h2 class="title">Student Life</h2>
        </div>
        <div class="uni-grid">
          <div class="card card-lift dash-card" data-reveal><div class="ic">🎭</div><h3>Clubs & Societies</h3><p class="muted">Dozens of student-run clubs spanning culture, coding, debate, arts and entrepreneurship.</p></div>
          <div class="card card-lift dash-card" data-reveal data-delay="1"><div class="ic" style="background:linear-gradient(135deg,#06b6d4,#0891b2)">🏆</div><h3>Sports Teams</h3><p class="muted">Football, cricket, basketball and athletics with modern on-campus sports facilities.</p></div>
          <div class="card card-lift dash-card" data-reveal data-delay="2"><div class="ic" style="background:linear-gradient(135deg,#10b981,#059669)">🌍</div><h3>International Community</h3><p class="muted">${escapeHtml(u.students)} students from across the globe — a warm welcome for Liberian students.</p></div>
          <div class="card card-lift dash-card" data-reveal data-delay="3"><div class="ic" style="background:linear-gradient(135deg,#f5b942,#d4880b)">🎉</div><h3>Cultural Events</h3><p class="muted">Festivals, cultural nights, hackathons and guest lectures throughout the year.</p></div>
        </div>
      </div>
    </section>

    <!-- 12. CAREER OPPORTUNITIES -->
    <section class="section">
      <div class="wrap">
        <div class="sec-head" data-reveal>
          <span class="eyebrow">Outcomes</span>
          <h2 class="title">Career Opportunities</h2>
        </div>
        <div class="grid-2col" style="align-items:stretch">
          <div class="card glass" data-reveal style="padding:2.2rem;text-align:center;display:flex;flex-direction:column;justify-content:center">
            <div class="stat-mini"><span data-count="${parseInt(u.placement, 10) || 0}" data-suffix="%">0</span></div>
            <div class="muted" style="margin-top:.4rem">Graduate Placement Rate</div>
          </div>
          <div class="card glass" data-reveal data-delay="1" style="padding:2.2rem;display:flex;flex-direction:column;gap:1.2rem">
            <div>
              <h3 style="font-size:1.1rem;margin-bottom:.3rem">💼 Internship Opportunities</h3>
              <p class="muted">A dedicated placement cell connects students with internships at leading regional and global companies.</p>
            </div>
            <div>
              <h3 style="font-size:1.1rem;margin-bottom:.3rem">🚀 Graduate Outcomes</h3>
              <p class="muted">Alumni progress into careers across technology, business, healthcare and engineering — or further study worldwide.</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 13. APPLY CTA -->
    <section class="section">
      <div class="wrap">
        <div class="glass text-center" data-reveal style="padding:3.5rem 2rem;background:${heroBg};border:none;color:#fff;border-radius:28px">
          <h2 class="title" style="color:#fff">Ready to join ${escapeHtml(u.name)}?</h2>
          <p class="lead" style="color:rgba(255,255,255,.9);max-width:560px;margin-inline:auto">Apply online in minutes and our counselors will guide you from offer letter to visa.</p>
          <div class="hero-cta" style="justify-content:center">
            <a class="btn btn-light" href="apply.html?uni=${encodeURIComponent(u.id)}">Apply Now →</a>
            <a class="btn btn-light" href="counseling.html">Talk to a Counselor</a>
          </div>
        </div>
      </div>
    </section>`;

    /* ── Save / bookmark ─────────────────────────────────── */
    document.getElementById("saveBtn").addEventListener("click", function () {
      const s = TIHStore.toggleSaved(u.id);
      const isSaved = s.includes(u.id);
      this.textContent = isSaved ? "★ Saved" : "☆ Save";
      toast(isSaved ? "Saved to your dashboard" : "Removed");
    });

    /* ── Eligibility checker ─────────────────────────────── */
    document.getElementById("egCheck").addEventListener("click", () => {
      const gpa = parseFloat(document.getElementById("egGpa").value);
      const waec = parseInt(document.getElementById("egWaec").value, 10);
      const level = document.getElementById("egLevel").value;
      const out = document.getElementById("egResult");

      if (isNaN(gpa) || isNaN(waec)) {
        out.className = "elig-result maybe";
        out.innerHTML = `<span style="font-size:1.3rem">⚠️</span><div>Please enter both your GPA and the number of WAEC subjects you passed to check your eligibility.</div>`;
        return;
      }

      const gpaScore  = gpa >= 3.5 ? 2 : gpa >= 2.5 ? 1 : 0;
      const waecScore = waec >= 6 ? 2 : waec >= 4 ? 1 : 0;
      const score = gpaScore + waecScore;

      if (score >= 3) {
        out.className = "elig-result ok";
        out.innerHTML = `<span style="font-size:1.3rem">✅</span><div><strong>Eligible — you qualify for ${escapeHtml(u.name)}!</strong><br>Your ${level} profile is strong. <a href="apply.html?uni=${encodeURIComponent(u.id)}" style="text-decoration:underline">Apply now →</a></div>`;
      } else if (score >= 2) {
        out.className = "elig-result maybe";
        out.innerHTML = `<span style="font-size:1.3rem">⚠️</span><div><strong>Conditionally Eligible — ${escapeHtml(u.name)} may require a foundation year.</strong><br>A counselor can map out your best ${level} pathway. <a href="counseling.html" style="text-decoration:underline">Book free counseling →</a></div>`;
      } else {
        out.className = "elig-result no";
        out.innerHTML = `<span style="font-size:1.3rem">❌</span><div><strong>Not Eligible yet — book a free counseling session to improve your profile.</strong><br>We'll help you build a route to ${escapeHtml(u.name)}. <a href="counseling.html" style="text-decoration:underline">Talk to a counselor →</a></div>`;
      }
    });

    requestAnimationFrame(() => { initReveal(); initCounters(); });
  }
</script>
</body>
</html>
